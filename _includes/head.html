<head>
  <title>{{ site.title }}</title>
  <link rel="shortcut icon" href="/assets/images/ryanvngo-icon-compact.png">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="{{ site.author }}">
  <meta name="description" content="{{ site.description }}">
  <meta name="keywords" content="ryan ngo, ryan, ngo">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">

  <script src="/assets/js/color-scheme.js"></script>
  <script src="/assets/js/buttons.js" defer></script>

  {% if page.layout == "astrophoto" %}
    <script src="/assets/js/astropage.js" defer></script>
  {% endif %}

  {% for style-sheet in page.style-sheets %}
    <link rel="stylesheet" href="{{ '/assets/css/' | append: style-sheet | append: '.css' | relative_url }}">
  {% endfor %}


</head>
